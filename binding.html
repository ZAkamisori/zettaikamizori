<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>装丁ギャラリー｜絶対安全剃刀</title>
  <link rel="stylesheet" href="style.css">
  <meta name="robots" content="noindex, nofollow">
</head>

<body class="gallery">
  <div class="top">
    <a class="back" href="index.html">← TOPへ戻る</a>
  </div>

  <main class="stage">
    <section class="card">
      <article>
        <h1>装丁ギャラリー</h1>
        <p class="note">本の装丁セット（表紙／裏表紙／中表紙）をまとめています。</p>
      </article>
    </section>

    <!-- 1冊ぶん：ここをコピーして増やす -->
    <section class="card book">
      <h2 class="bookTitle">Boudoir Rose（装丁）</h2>

      <div class="bookGrid">
        <figure>
          <img src="books/boudoirrose/front.jpg" alt="Boudoir Rose 表紙">
          <figcaption>表紙</figcaption>
        </figure>

        <figure>
          <img src="books/boudoirrose/back.jpg" alt="Boudoir Rose 裏表紙">
          <figcaption>裏表紙</figcaption>
        </figure>

        <figure>
          <img src="books/boudoirrose/inside.jpg" alt="Boudoir Rose 中表紙">
          <figcaption>中表紙</figcaption>
        </figure>
      </div>

      <!-- 任意：仕様メモ -->
      <p class="note">B6 / 〇〇pp / マットPP（などメモがあれば）</p>
    </section>

    <footer class="foot">©絶対安全剃刀</footer>
  </main>
</body>
</html>
